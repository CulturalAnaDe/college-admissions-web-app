services:
  postgres_db:
    image: postgres:18-alpine
    container_name: college_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: college_admissions
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: ./backend
    container_name: college_backend
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      - postgres_db
    volumes:
      - college_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://admission.collegeit.edu.kz
    container_name: college_frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  pgdata:
  college_uploads:
